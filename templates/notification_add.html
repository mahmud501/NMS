{% extends "base.html" %}

{% block title %}NMS - Add Notifications{% endblock %}

{% block content %}
<div class="add-notification-container">
    <div class="form-container">
        <h2>Add New Notifications</h2>

        <form method="POST">
            <div class="form-group">
                <label for="user_id">Username *</label>
               <select id="user_id" name="user_id" required>
                    <option value="">Select User</option>
                    {% for user in users %}
                        <option value="{{ user.user_id }}" data-email="{{user.email}}">{{user.username}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                
                <label for="email">Email Address *</label>
                <input type="email" name="email" id="email" disabled>
                <small class="form-text">email will be obtained from users</small>
            </div>

            <div class="form-group">
                <label for="severity">Alert Severity</label>
                <select id="severity" name="severity" required>
                    <option value="">Select Severity</option>
                    <option value="critical">Critical</option>
                    <option value="warning">Warning</option>
                    <option value="info">Info</option>
                </select>
            </div>
            <div class="form-group">
                <label for="method">Methods</label>
                <select id="method" name="method" required>
                    <option value="">Select Method</option>
                    <option value="email">Email</option>
                    <!-- <option value="sms">SMS</option> -->
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Notification</button>
                <a href="/notifications/settings" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const email = document.getElementById('email');
    const userID = document.getElementById('user_id');

    userID.addEventListener('change', function() {
        const selectedOption = userID.options[userID.selectedIndex];
        const selectedEmail = selectedOption.getAttribute('data-email');

        email.value=selectedEmail;
    });
});
</script>

{% endblock %}
