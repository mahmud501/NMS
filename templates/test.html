<!DOCTYPE html>
<html>

<head>
    <title>Live Polling Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <canvas id="liveChart" width="800" height="400"></canvas>

    <script>
        function formatTraffic(bps) {
            if (bps === 0 || bps === null || bps === undefined) return '0 bps';

            const absBps = Math.abs(bps);
            if (absBps >= 1e9) {
                return (bps / 1e9).toFixed(2) + ' Gbps';
            } else if (absBps >= 1e6) {
                return (bps / 1e6).toFixed(1) + ' Mbps';
            } else if (absBps >= 1e3) {
                return (bps / 1e3).toFixed(1) + ' kbps';
            } else {
                return bps.toFixed(0) + ' bps';
            }
        }
        const ctx = document.getElementById('liveChart').getContext('2d');

        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],   
                datasets: [
                    {
                        label: 'IN Bandwidth (bps)',
                        data: [],  
                        borderColor: 'blue',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.1
                    },
                    {
                        label: 'OUT Bandwidth (bps)',
                        data: [], 
                        borderColor: 'red',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.1
                    }],
            },
            options: {
                animation: false,  // IMPORTANT for real-time
                scales: {
                    x: {
                        title: { display: true, text: 'Time' }
                    },
                    y: {
                        title: { display: true, text: 'Traffic' },
                        ticks: {
                            callback: function (value) {
                                return formatTraffic(value);
                            }
                        },
                        min: 0
                    }
                }
            }
        });
        async function fetchData() {
            try {
                const response = await fetch('/api/live_traffic');
                const data = await response.json();


                const currentTime = new Date().toLocaleTimeString();

                // Add new point WITHOUT destroying previous
                liveChart.data.labels.push(currentTime);
                liveChart.data.datasets[0].data.push(data.in_bps);
                liveChart.data.datasets[1].data.push(data.out_bps);

                // Optional: Keep only last 50 points
                if (liveChart.data.labels.length > 50) {
                    liveChart.data.labels.shift();
                    liveChart.data.datasets[0].data.shift();
                    liveChart.data.datasets[1].data.shift();
                }

                liveChart.update();

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Poll every 5 seconds
        setInterval(fetchData, 5000);
    </script>

</body>

</html>
