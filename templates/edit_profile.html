{% extends "base.html" %}

{% block title %}NMS - Edit Profile{% endblock %}

{% block content %}
<div class="profile-container">
    <h2>Edit Profile</h2>

    <div class="profile-card">
        <form method="POST" action="/profile/edit">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" value="{{ user.username }}" readonly class="form-control">
                <small class="form-text text-muted">Username cannot be changed</small>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required class="form-control">
            </div>

            <div class="form-group">
                <label for="role">Role:</label>
                <input type="text" id="role" name="role" value="{{ user.role_name|title }}" readonly class="form-control">
                <small class="form-text text-muted">Role cannot be changed</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Profile</button>
                <a href="/profile" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
